name: Fetch RSS Feeds

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: フィード取得スクリプト実行
        run: python scripts/fetch_feeds.py

      - name: 重複除去・台帳更新
        run: python scripts/dedup_feeds.py
        
      - name: feeds/history をコミット・プッシュ
        run: |
          git config user.name "feed-relay-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update feeds & history ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            git pull --rebase --autostash origin main
            git push
          fi
